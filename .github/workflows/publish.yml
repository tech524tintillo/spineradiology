name: Publish editor edit

# Fires when an editor's PR is merged to main (a docs/<cat>/<slug>.md change lands).
# Runs the SAME redesign/publish.sh a human would: clean regen of the edited article, restore the
# approved overlay, surgical body+date+search splice, hard diff-gate, deploy, then re-freeze the
# overlay and commit it back. So: merge the PR -> the site updates itself.
on:
  push:
    branches: [main]
    paths: ['docs/**/*.md']        # only doc edits; the bot's overlay commit (redesign/**) won't re-trigger
  workflow_dispatch:               # manual run from the Actions tab
    inputs:
      files:
        description: 'Explicit docs to publish (space-separated), e.g. "docs/anatomy/craniocervical-junction.md". Blank = derive from HEAD^..HEAD. Use this to RECOVER an article whose overlay push failed.'
        required: false
        default: ''

permissions:
  contents: write                  # to push the re-frozen overlay back to main

concurrency:
  group: spineradiology-publish    # never run two publishes at once (avoids overlay races)
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main tip (NOT the trigger commit — build on the latest committed overlay)
        # Pinning to github.sha froze each run's overlay baseline at push time; when a prior edit's
        # [skip ci] overlay commit had already advanced main, re-freezing + rebasing the BINARY
        # overlay tarball hit an unmergeable conflict and the push failed (the craniocervical race,
        # 2026-07-08). Checking out main tip means each (serialized) run starts from the newest
        # overlay, so its re-freeze is a clean fast-forward. Full history still present for git dates.
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python (match the pinned local toolchain)
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pinned build toolchain
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs==1.6.1" "mkdocs-material==9.7.5" \
                      "mkdocs-git-revision-date-localized-plugin==1.5.1" "Pillow==11.1.0" \
                      "mkdocs-glightbox==0.5.2"

      - name: Install wrangler (pinned, global so publish.sh resolves it on PATH)
        run: npm install -g wrangler@4.85.0

      - name: Resolve changed docs (dispatch input > squash / merge / multi-commit push diff)
        id: changed
        env:
          DISPATCH_FILES: ${{ github.event.inputs.files }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${DISPATCH_FILES// /}" ]; then
            files="$DISPATCH_FILES"                       # explicit recovery / manual publish
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'docs/**/*.md' | tr '\n' ' ')"
          else
            files=""        # workflow_dispatch w/o input -> let publish.sh derive from HEAD^ HEAD
          fi
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "Changed docs: ${files:-<none / dispatch>}"

      - name: Publish (regen -> diff-gate -> deploy -> re-freeze)
        id: publish
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          if [ -n "${CHANGED_FILES// /}" ]; then
            bash redesign/publish.sh --files $CHANGED_FILES
          else
            bash redesign/publish.sh
          fi

      - name: Commit the re-frozen overlay back to main (rebase + retry — ref-main makes overlay conflicts impossible)
        if: steps.publish.outputs.deployed == 'true'
        run: |
          git config user.name  "spineradiology-bot"
          git config user.email "bot@users.noreply.github.com"
          git add redesign/snapshots/redesign-overlay.tar.gz redesign/bodies
          git commit -m "publish: re-freeze overlay after edit [skip ci]"
          # rebase-replay of ONLY the overlay/bodies delta onto the latest main. With ref:main
          # checkout above, no concurrent PUBLISH run can commit an overlay during this run
          # (concurrency serializes them), so the only commits landing on main mid-run are docs PR
          # merges — which never touch overlay/bodies. Rebasing our overlay delta over a docs change
          # therefore CANNOT conflict, yet still PRESERVES that concurrent docs change (the silent
          # revert we must not reintroduce). A genuine overlay collision (a human running publish.sh
          # by hand during CI) fails loudly below rather than silently clobbering the edit.
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "overlay pushed."; exit 0
            fi
            echo "push attempt $i failed; retrying after rebase…"; sleep 3
          done
          echo "::error::Overlay push FAILED after 5 tries — LIVE is updated but the committed overlay is STALE. RECOVER by re-publishing the article: Actions -> Publish editor edit -> Run workflow -> files=docs/<cat>/<slug>.md (or locally: redesign/publish.sh --files docs/<cat>/<slug>.md)."
          exit 1

      - name: Telegram ping — published (best-effort; skips if secrets unset)
        if: steps.publish.outputs.deployed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping ping."; exit 0
          fi
          text="✅ SpineRadiology published — live now.
          Files: ${CHANGED_FILES:-<derived from HEAD>}
          ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${text}" \
            -d disable_web_page_preview=true >/dev/null \
            && echo "telegram ping sent." || echo "telegram ping failed (non-fatal)."

      - name: Surface failure loudly (+ Telegram)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "::error::Auto-publish FAILED. If the deploy succeeded but a later step failed, the live site and the committed overlay may have diverged — fix before the next edit."
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            text="❌ SpineRadiology auto-publish FAILED — the site may NOT have updated. Check the run:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${text}" >/dev/null || true
          fi
