site_name: Spine Radiology
site_url: https://spineradiology.com
site_description: A comprehensive wiki and reference for spine radiology — anatomy, pathology, imaging findings, and differential diagnosis.
site_author: Expert Radiology

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: indigo
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.tooltips
  icon:
    logo: material/hospital-box
  favicon: assets/images/favicon.png

plugins:
  - search:
      separator: '[\s\-\.]+'
  - tags
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - def_list
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:avery@expertradiology.com
  generator: false

extra_css:
  - assets/css/custom.css

copyright: "&copy; 2025 SpineRadiology.com — For educational purposes only. Not a substitute for clinical judgment."

